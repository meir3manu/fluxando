<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOA - Cadastro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow:focus {
            box-shadow: 0 0 15px rgba(241, 180, 52, 0.3);
            border-color: #F1B434;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body class="">

    <header id="header" class="no-margin">
        <div class="imgs">
        <img src="imgs/logo fluxando.svg" width="50px">
        <img src="imgs/logo puc rio ecoa.png" width="125px">
        </div>
        <div id="header_username" class="username">
        
        </div>
    </header>
    <section id="login-section" class="content flex direction-column gap-5 text-white">
        <div>
            <p class="subtitle">Seja bem-vindo ao</p>
            <img src="imgs/Fluxando_title.svg">
        </div>
        <div id="login-box" class="box-area">
            <form id="register-form" class="cadastro flex direction-column gap-2">
                <label for="nome">Nome completo</label>
                <input class="text-box" id="nome" type="text">
                <label for="email">E-mail Institucional</label>
                <input class="text-box" id="email" type="email">
                <label for="telefone">Celular / Telefone</label>
                <input class="text-box" id="telefone" type="tel" placeholder="(99) 99999-9999" maxlength="15">
                <div class="flex flex-1 gap-2">
                    <div class="flex flex-1 direction-column gap-2">
                        <label for="password">Senha</label>
                        <input class="text-box" id="password" type="password">
                    </div>
                    <div class="flex flex-1 direction-column gap-2">
                        <label for="data_nascimento">Data de nascimento</label>
                        <input class="text-box" id="data_nascimento" type="date">
                    </div>
                </div>
                <label for="setor">Setor</label>

                <select name="setor" id="setor">
                    <option value="DEV">DEV</option>
                    <option value="Pesquisador">Pesquisador</option>
                    <option value="ADM / Financeiro">ADM / Financeiro</option>
                    <option value="Logística">Logística</option>
                    <option value="Infraestrutura">Infraestrutura</option>
                </select>
                
                <div class="flex align-items-center direction-column gap-2">
                    <button type="submit" id="btn-register">Se juntar ao fluxo</button>
                    <p style="font-weight: 300;">Já tem conta? <b><a href="login.html">Entre aqui</a></b></p>
                    <p id="feedback-msg"></p>
                </div>
            </form>
        </div>
        <img id="fluxando_trans" class="pos-fixed" src="imgs/logo_fluxando_trans.png">
    </section>
    
    <!-- Efeito de Fundo
    <div class="absolute top-0 left-0 w-full h-full pointer-events-none">
        <div class="absolute -top-24 -right-24 w-96 h-96 bg-blue-500/10 rounded-full blur-[100px]"></div>
        <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-[#F1B434]/10 rounded-full blur-[100px]"></div>
    </div>

    <div class="max-w-md w-full glass p-10 rounded-[40px] shadow-2xl relative z-10">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black italic text-[#F1B434] uppercase tracking-tighter mb-2">CADASTRO ECOA</h1>
            <p class="text-gray-400 text-sm font-medium">Crie sua conta de funcionário</p>
        </div>

        <form id="register-form" class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-1 ml-1">Nome Completo</label>
                <input type="text" id="nome" required placeholder="João da Silva" 
                    class="w-full bg-gray-900/50 border border-white/10 rounded-2xl p-4 text-sm outline-none glow transition-all">
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-1 ml-1">E-mail Corporativo</label>
                <input type="email" id="email" required placeholder="exemplo@email.com" 
                    class="w-full bg-gray-900/50 border border-white/10 rounded-2xl p-4 text-sm outline-none glow transition-all">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-1 ml-1">Senha</label>
                    <input type="password" id="password" required placeholder="••••••••" 
                        class="w-full bg-gray-900/50 border border-white/10 rounded-2xl p-4 text-sm outline-none glow transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-1 ml-1">Nascimento</label>
                    <input type="date" id="data_nascimento" required 
                        class="w-full bg-gray-900/50 border border-white/10 rounded-2xl p-4 text-sm outline-none glow transition-all text-gray-400">
                </div>
            </div>

            <button type="submit" id="btn-register" 
                class="w-full bg-[#F1B434] hover:bg-[#ffc64d] text-[#2D3F4B] font-black py-4 rounded-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2 mt-4">
                <span>CRIAR CONTA AGORA</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
            </button>
        </form>

        <p id="feedback-msg" class="text-[10px] text-center mt-6 font-bold hidden uppercase tracking-wider"></p>
        
        <div class="mt-8 text-center pt-6 border-t border-white/5">
            <a href="login.html" class="text-gray-400 hover:text-white text-xs font-bold uppercase transition-colors">Já tem conta? Clique aqui para entrar</a>
        </div>
    </div>
    -->

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const SUPABASE_URL = 'https://ombfusthhrhhhozrkfib.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tYmZ1c3RoaHJoaGhvenJrZmliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjkzNzMsImV4cCI6MjA4OTIwNTM3M30.jp3vbt01vpxDcSTuOzLNJi3owDz7R1_x1Q-zRKp2bXY';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('register-form');
        const feedbackMsg = document.getElementById('feedback-msg');
        const btn = document.getElementById('btn-register');

        const input = document.getElementById('telefone');
        input.addEventListener('input', (e) => {
        let valor = e.target.value.replace(/\D/g, ''); // remove tudo que não é número

        valor = valor.replace(/^(\d{2})(\d)/g, '($1) $2');      // (99) 9
        valor = valor.replace(/(\d{5})(\d)/, '$1-$2');          // 99999-9999

        e.target.value = valor;
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            feedbackMsg.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Cadastrando...';

            const payload = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                // Na vida real usaríamos Auth.signUp, mas para este MVP gravaremos na tabela de usuários
                // Se a coluna senha/data_nascimento não existir, o Supabase retornará erro e avisaremos
                senha: document.getElementById('password').value,
                celular: document.getElementById('telefone').value.replace(/\D/g, ''),
                data_nascimento: document.getElementById('data_nascimento').value,
                setor: document.getElementById('setor').value.toLowerCase() || "dev" // Padrão
            };

            try {
                const { error } = await supabase.from('usuarios').insert([payload]);

                if (error) {
                    if(error.message.includes('column') || error.message.includes('não existe')) {
                       throw new Error('Erro técnico: O banco de dados precisa ser atualizado com as novas colunas.');
                    }
                    throw error;
                }

                feedbackMsg.textContent = 'CONTA CRIADA! REDIRECIONANDO...';
                feedbackMsg.className = 'text-green-400 text-[10px] text-center mt-6 font-bold uppercase tracking-wider';
                feedbackMsg.classList.remove('hidden');
                
                // Redirecionamento inteligente
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect') || 'login.html';
                
                setTimeout(() => window.location.href = redirect, 2000);

            } catch (err) {
                feedbackMsg.textContent = err.message;
                feedbackMsg.className = 'text-red-400 text-[10px] text-center mt-6 font-bold uppercase tracking-wider';
                feedbackMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Se juntar ao fluxo';
            }
        });
    </script>
</body>
</html>
