<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOA - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Helvetica Neue';
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glow:focus {
            box-shadow: 0 0 15px rgba(241, 180, 52, 0.3);
            border-color: #fff;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body class="disable-hor-scroll">

    <header id="header" class="no-margin">
        <div class="imgs">
        <img src="imgs/logo fluxando.svg" width="50px">
        <img src="imgs/logo puc rio ecoa.png" width="125px">
        </div>
        <div id="header_username" class="username">
        
        </div>
    </header>
    <section id="login-section" class="content flex direction-column gap-5 text-white">
        <div>
            <p class="subtitle">Seja bem-vindo ao</p>
            <img src="imgs/Fluxando_title.svg">
        </div>
        <div id="login-box" class="box-area">
            <form id="login-form" class="login flex direction-column gap-2">
                <label for="email">E-mail Institucional ou telefone</label>
                <input class="text-box" id="email" type="email">
                <label for="password">Senha</label>
                <input class="text-box" id="password" type="password">
                <div class="flex align-items-center direction-column gap-2">
                    <button type="submit" id="btn-login">Entrar</button>
                    <p style="font-weight: 300;">Não tem conta? <b><a href="cadastro.html">Cadastre-se aqui</a></b></p>
                    <p id="error-msg"></p>
                </div>
            </form>
        </div>
        <img id="fluxando_trans" class="pos-fixed" src="./imgs/logo_fluxando_trans.png">
    </section>


    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const SUPABASE_URL = 'https://ombfusthhrhhhozrkfib.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tYmZ1c3RoaHJoaGhvenJrZmliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjkzNzMsImV4cCI6MjA4OTIwNTM3M30.jp3vbt01vpxDcSTuOzLNJi3owDz7R1_x1Q-zRKp2bXY';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const btn = document.getElementById('btn-login');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Verificando..';

            const email = document.getElementById('email').value;
            const senha = document.getElementById('password').value;

            try {
                // Busca o usuário na tabela usuarios conferindo Email e Senha
                const { data, error } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('email', email)
                    .eq('senha', senha)
                    .single();

                if (error || !data) throw new Error('E-mail ou Senha incorretos.');

                sessionStorage.setItem('ecoa_user', JSON.stringify(data));
                
                // Redirecionamento inteligente
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect') || 'index.html';
                window.location.href = redirect;

            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        });
    </script>
</body>

</html>
